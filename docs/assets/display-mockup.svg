<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#13100d"/>
      <stop offset="100%" stop-color="#090706"/>
    </radialGradient>
    <radialGradient id="gloss" cx="30%" cy="12%">
      <stop offset="0%" stop-color="#ffe9cd" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffe9cd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shell" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#34271f"/>
      <stop offset="60%" stop-color="#181210"/>
      <stop offset="100%" stop-color="#433126"/>
    </radialGradient>
    <clipPath id="displayClip">
      <circle cx="240" cy="240" r="210"/>
    </clipPath>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&amp;display=swap');
      .transit-bold { font-family: 'Overpass', 'Gill Sans', sans-serif; font-weight: 700; }
      .transit-light { font-family: 'Overpass', 'Gill Sans', sans-serif; font-weight: 400; }
    </style>
  </defs>

  <!-- Outer shell -->
  <circle cx="240" cy="240" r="240" fill="url(#shell)"/>
  <circle cx="240" cy="240" r="232" fill="none" stroke="#e7d6b8" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Display face -->
  <circle cx="240" cy="240" r="222" fill="#251c16"/>
  <circle cx="240" cy="240" r="210" fill="url(#bg)"/>
  <circle cx="240" cy="240" r="210" fill="url(#gloss)"/>

  <g clip-path="url(#displayClip)">

    <!-- Clock -->
    <text x="240" y="105" text-anchor="middle" class="transit-bold" fill="#e6d7bc" font-size="48" letter-spacing="0.05em">12<tspan fill-opacity="0.88">:</tspan>34</text>

    <!-- Underground section -->
    <text x="240" y="148" text-anchor="middle" class="transit-light" fill="#ab9a80" font-size="11" letter-spacing="0.16em" text-transform="uppercase">UNDERGROUND</text>
    <line x1="80" y1="154" x2="400" y2="154" stroke="#e7d6b8" stroke-opacity="0.18" stroke-width="1"/>

    <!-- Central line row -->
    <g transform="translate(62, 166)">
      <rect width="356" height="38" rx="0" fill="#1b1411" fill-opacity="0.96" stroke="#e7d6b8" stroke-opacity="0.76" stroke-width="2"/>
      <rect width="100" height="38" fill="#E32017"/>
      <text x="50" y="25" text-anchor="middle" class="transit-bold" fill="#f3f5f7" font-size="18" letter-spacing="0.05em">CENTRAL</text>
      <text x="116" y="25" class="transit-bold" fill="#e6d7bc" font-size="20">Good Service</text>
    </g>

    <!-- Elizabeth line row -->
    <g transform="translate(62, 214)">
      <rect width="356" height="38" rx="0" fill="#1b1411" fill-opacity="0.96" stroke="#e7d6b8" stroke-opacity="0.76" stroke-width="2"/>
      <rect width="122" height="38" fill="#6950A1"/>
      <text x="61" y="25" text-anchor="middle" class="transit-bold" fill="#f3f5f7" font-size="18" letter-spacing="0.05em">ELIZABETH</text>
      <text x="138" y="25" class="transit-bold" fill="#e6d7bc" font-size="20">Minor Delays</text>
    </g>

    <!-- Buses section -->
    <text x="240" y="288" text-anchor="middle" class="transit-light" fill="#ab9a80" font-size="11" letter-spacing="0.16em">BUSES</text>
    <line x1="80" y1="294" x2="400" y2="294" stroke="#e7d6b8" stroke-opacity="0.18" stroke-width="1"/>

    <!-- Bus 58 row -->
    <g transform="translate(80, 306)">
      <rect width="320" height="46" fill="#3c0f11" fill-opacity="0.95" stroke="#e7d6b8" stroke-opacity="0.76" stroke-width="2"/>
      <!-- Route chip -->
      <rect width="56" height="46" fill="#b23a2c"/>
      <text x="28" y="30" text-anchor="middle" class="transit-bold" fill="#e6d7bc" font-size="20" letter-spacing="0.05em">58</text>
      <!-- Destination -->
      <text x="66" y="29" class="transit-light" fill="#e6d7bc" font-size="14" letter-spacing="0.02em">to Walthamstow</text>
      <!-- Separator -->
      <line x1="196" y1="10" x2="196" y2="36" stroke="#e7d6b8" stroke-opacity="0.38" stroke-width="1"/>
      <!-- ETA 1 -->
      <rect x="206" y="9" width="46" height="28" fill="#240a0c" fill-opacity="0.96" stroke="#e7d6b8" stroke-opacity="0.42" stroke-width="2"/>
      <text x="229" y="29" text-anchor="middle" class="transit-light" fill="#e6d7bc" font-size="20">2m</text>
      <!-- Separator -->
      <line x1="262" y1="10" x2="262" y2="36" stroke="#e7d6b8" stroke-opacity="0.38" stroke-width="1"/>
      <!-- ETA 2 -->
      <rect x="272" y="9" width="40" height="28" fill="#240a0c" fill-opacity="0.96" stroke="#e7d6b8" stroke-opacity="0.42" stroke-width="2"/>
      <text x="292" y="29" text-anchor="middle" class="transit-light" fill="#e6d7bc" font-size="20">7m</text>
    </g>

    <!-- Bus 257 row -->
    <g transform="translate(80, 362)">
      <rect width="320" height="46" fill="#3c0f11" fill-opacity="0.95" stroke="#e7d6b8" stroke-opacity="0.76" stroke-width="2"/>
      <!-- Route chip -->
      <rect width="56" height="46" fill="#b23a2c"/>
      <text x="28" y="30" text-anchor="middle" class="transit-bold" fill="#e6d7bc" font-size="20" letter-spacing="0.05em">257</text>
      <!-- Destination -->
      <text x="66" y="29" class="transit-light" fill="#e6d7bc" font-size="14" letter-spacing="0.02em">to Stratford</text>
      <!-- Separator -->
      <line x1="196" y1="10" x2="196" y2="36" stroke="#e7d6b8" stroke-opacity="0.38" stroke-width="1"/>
      <!-- ETA 1 -->
      <rect x="206" y="9" width="46" height="28" fill="#240a0c" fill-opacity="0.96" stroke="#e7d6b8" stroke-opacity="0.42" stroke-width="2"/>
      <text x="229" y="29" text-anchor="middle" class="transit-light" fill="#e6d7bc" font-size="20">1m</text>
      <!-- Separator -->
      <line x1="262" y1="10" x2="262" y2="36" stroke="#e7d6b8" stroke-opacity="0.38" stroke-width="1"/>
      <!-- ETA 2 -->
      <rect x="272" y="9" width="40" height="28" fill="#240a0c" fill-opacity="0.96" stroke="#e7d6b8" stroke-opacity="0.42" stroke-width="2"/>
      <text x="292" y="29" text-anchor="middle" class="transit-light" fill="#e6d7bc" font-size="20">9m</text>
    </g>

  </g>

  <!-- Subtle rim highlight -->
  <circle cx="240" cy="240" r="210" fill="none" stroke="#e7d6b8" stroke-opacity="0.04" stroke-width="1"/>
</svg>
